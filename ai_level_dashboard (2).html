<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 레벨 테스트 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 32px 20px; }
  .container { max-width: 960px; margin: 0 auto; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 10px; }
  .top-bar h1 { font-size: 22px; font-weight: 700; }
  .live-wrap { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #20a08a; animation: pulse 1.5s infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .time-label { font-size: 12px; color: #888; }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
  .metric { background: #fff; border-radius: 12px; padding: 20px 22px; border: 1px solid #e8e6e0; }
  .metric-label { font-size: 12px; color: #999; margin-bottom: 8px; }
  .metric-value { font-size: 32px; font-weight: 700; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e6e0; padding: 24px; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; color: #1a1a1a; }

  /* 바 차트 */
  .bar-row { margin-bottom: 18px; }
  .bar-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .bar-label { font-size: 13px; font-weight: 700; }
  .bar-count { font-size: 13px; color: #888; }
  .bar-track { height: 10px; background: #f0ede8; border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 0.7s ease; }

  /* 도넛 차트 */
  .donut-wrap { display: flex; flex-direction: column; align-items: center; }
  .donut-svg-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto 20px; }
  .donut-svg-wrap svg { width: 220px; height: 220px; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .donut-center-num { font-size: 36px; font-weight: 700; color: #1a1a1a; line-height: 1; }
  .donut-center-label { font-size: 12px; color: #999; margin-top: 4px; }

  /* 레전드 */
  .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; width: 100%; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend-info { flex: 1; }
  .legend-name { font-size: 12px; color: #555; }
  .legend-val { font-size: 13px; font-weight: 700; }

  .connecting { text-align: center; padding: 80px 0; color: #aaa; font-size: 15px; }
  #main-content { display: none; }

  @media (max-width: 600px) {
    .charts-row { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>AI 레벨 테스트 대시보드</h1>
    <div class="live-wrap">
      <span class="dot"></span>
      <span class="time-label" id="update-time">연결 중...</span>
    </div>
  </div>

  <div class="connecting" id="connecting">🔥 Firebase에 연결 중...</div>

  <div id="main-content">
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">총 참여자</div>
        <div class="metric-value" id="m-total">0<span style="font-size:18px;font-weight:400;color:#999">명</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">평균 선택 항목</div>
        <div class="metric-value" id="m-avg">-<span style="font-size:18px;font-weight:400;color:#999">개</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">가장 많은 레벨</div>
        <div class="metric-value" id="m-top" style="color:#7c3aed">-</div>
      </div>
    </div>

    <div class="charts-row">
      <!-- 바 차트 -->
      <div class="card">
        <div class="card-title">레벨별 인원</div>
        <div id="bars"></div>
      </div>

      <!-- 도넛 차트 -->
      <div class="card donut-wrap">
        <div class="card-title" style="align-self:flex-start;width:100%">레벨 분포</div>
        <div class="donut-svg-wrap">
          <svg viewBox="0 0 220 220" id="donut-svg"></svg>
          <div class="donut-center">
            <div class="donut-center-num" id="donut-total">0</div>
            <div class="donut-center-label">총 참여자</div>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDnPZALC_zKdS9O62NffOrwh29wZwyq-YM",
  authDomain: "aitest-793cc.firebaseapp.com",
  databaseURL: "https://aitest-793cc-default-rtdb.firebaseio.com",
  projectId: "aitest-793cc",
  storageBucket: "aitest-793cc.firebasestorage.app",
  messagingSenderId: "772512191617",
  appId: "1:772512191617:web:412bd8c5d00cd0975f2980"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const COLORS = { 1:'#6c757d', 2:'#1D9E75', 3:'#f59e0b', 4:'#7c3aed' };
const NAMES  = { 1:'Level 1 (0~3개)', 2:'Level 2 (4~9개)', 3:'Level 3 (10~15개)', 4:'Level 4 (16~17개)' };

function render(results) {
  document.getElementById('connecting').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  const total = results.length;
  const counts = [1,2,3,4].map(l => ({ l, n: results.filter(r => r.level === l).length }));
  const avg = total > 0 ? (results.reduce((s,r) => s + r.count, 0) / total).toFixed(1) : '-';
  const topLevel = total > 0 ? counts.reduce((a,b) => a.n >= b.n ? a : b).l : '-';

  document.getElementById('m-total').innerHTML = total + '<span style="font-size:18px;font-weight:400;color:#999">명</span>';
  document.getElementById('m-avg').innerHTML = avg !== '-' ? avg + '<span style="font-size:18px;font-weight:400;color:#999">개</span>' : '-';
  document.getElementById('m-top').textContent = topLevel !== '-' ? 'Level ' + topLevel : '-';
  document.getElementById('m-top').style.color = topLevel !== '-' ? COLORS[topLevel] : '#999';
  document.getElementById('update-time').textContent = new Date().toLocaleTimeString() + ' 실시간';
  document.getElementById('donut-total').textContent = total;

  // ── 바 차트 ──
  document.getElementById('bars').innerHTML = counts.map(({l, n}) => {
    const pct = total > 0 ? Math.round(n / total * 100) : 0;
    return `<div class="bar-row">
      <div class="bar-meta">
        <span class="bar-label" style="color:${COLORS[l]}">Level ${l}</span>
        <span class="bar-count">${n}명 &nbsp; ${pct}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${COLORS[l]}"></div>
      </div>
    </div>`;
  }).join('');

  // ── 도넛 차트 (SVG) ──
  const cx = 110, cy = 110, R = 88, sw = 28;
  const circ = 2 * Math.PI * R;
  const gap = 3; // 세그먼트 사이 간격(px)
  const svgEl = document.getElementById('donut-svg');

  if (total === 0) {
    svgEl.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#e8e6e0" stroke-width="${sw}"/>`;
  } else {
    let offset = 0;
    const segs = counts.map(({l, n}) => {
      const pct = n / total;
      const dash = Math.max(0, pct * circ - gap);
      const s = { l, n, pct, dash, offset };
      offset += pct;
      return s;
    });

    // 세그먼트
    const paths = segs.map(s => {
      const dashOffset = -(s.offset * circ) + gap / 2;
      return `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none"
        stroke="${COLORS[s.l]}" stroke-width="${sw}"
        stroke-dasharray="${s.dash} ${circ - s.dash}"
        stroke-dashoffset="${dashOffset}"
        style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray .7s"/>`;
    }).join('');

    // 퍼센트 라벨 — 세그먼트 중앙에 표시
    const labels = segs.filter(s => s.pct > 0.05).map(s => {
      const angle = (s.offset + s.pct / 2) * 2 * Math.PI - Math.PI / 2;
      const labelR = R;
      const lx = cx + labelR * Math.cos(angle);
      const ly = cy + labelR * Math.sin(angle);
      const pct = Math.round(s.pct * 100);
      const nStr = s.n + '명';
      return `
        <text x="${lx}" y="${ly - 7}" text-anchor="middle" dominant-baseline="central"
          font-size="13" font-weight="700" fill="white" font-family="Noto Sans KR">${pct}%</text>
        <text x="${lx}" y="${ly + 9}" text-anchor="middle" dominant-baseline="central"
          font-size="11" fill="white" font-family="Noto Sans KR">${nStr}</text>`;
    }).join('');

    svgEl.innerHTML = paths + labels;
  }

  // ── 레전드 ──
  document.getElementById('legend').innerHTML = counts.map(({l, n}) => {
    const pct = total > 0 ? Math.round(n / total * 100) : 0;
    return `<div class="legend-item">
      <span class="legend-dot" style="background:${COLORS[l]}"></span>
      <div class="legend-info">
        <div class="legend-name">${NAMES[l]}</div>
        <div class="legend-val" style="color:${COLORS[l]}">${n}명 · ${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

onValue(ref(db, 'results'), (snapshot) => {
  const data = snapshot.val();
  const results = data ? Object.values(data).sort((a,b) => b.ts - a.ts) : [];
  render(results);
});
</script>
</body>
</html>
