<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 레벨 테스트 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 28px 16px; }
  .container { max-width: 820px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .top-bar h1 { font-size: 20px; font-weight: 700; }
  .live-wrap { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #20a08a; animation: pulse 1.5s infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .time-label { font-size: 12px; color: #888; }
  .refresh-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
  .refresh-btn:hover { background: #f0ede8; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .metric { background: #fff; border-radius: 10px; padding: 16px 18px; border: 1px solid #e8e6e0; }
  .metric-label { font-size: 12px; color: #999; margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 700; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e6e0; padding: 20px 22px; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .bar-row { margin-bottom: 14px; }
  .bar-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .bar-label { font-size: 13px; font-weight: 600; }
  .bar-count { font-size: 13px; color: #999; }
  .bar-track { height: 8px; background: #f0ede8; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .donut-card { display: flex; flex-direction: column; align-items: center; }
  svg.donut { width: 150px; height: 150px; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 14px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .participants-card { background: #fff; border-radius: 14px; border: 1px solid #e8e6e0; padding: 20px 22px; }
  .p-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 14px; }
  .p-chip { border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
  .chip-name { font-size: 13px; font-weight: 600; }
  .chip-count { font-size: 11px; color: #888; margin-top: 2px; }
  .chip-badge { font-size: 12px; font-weight: 700; padding: 4px 9px; border-radius: 6px; background: #fff; }
  .empty { text-align: center; padding: 40px 0; color: #aaa; font-size: 14px; line-height: 1.8; }
  .connecting { text-align: center; padding: 60px 0; color: #aaa; font-size: 14px; }
  @media (max-width: 520px) { .charts-row { grid-template-columns: 1fr; } .metrics { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>AI 레벨 테스트 대시보드</h1>
    <div class="live-wrap">
      <span class="dot"></span>
      <span class="time-label" id="update-time">연결 중...</span>
      <button class="refresh-btn" onclick="loadData()">새로고침</button>
    </div>
  </div>

  <div id="main-content" style="display:none">
    <div class="metrics">
      <div class="metric"><div class="metric-label">총 참여자</div><div class="metric-value" id="m-total">0명</div></div>
      <div class="metric"><div class="metric-label">평균 선택 항목</div><div class="metric-value" id="m-avg">-</div></div>
      <div class="metric"><div class="metric-label">Level 4 비율</div><div class="metric-value" id="m-top">-</div></div>
    </div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">레벨별 인원</div>
        <div id="bars"></div>
      </div>
      <div class="card donut-card">
        <div class="card-title" style="align-self:flex-start">레벨 분포</div>
        <svg class="donut" viewBox="0 0 160 160" id="donut-svg" aria-label="레벨 분포 도넛 차트"></svg>
        <div class="legend" id="legend"></div>
      </div>
    </div>
    <div class="participants-card">
      <div class="card-title">참여자 목록 <span id="p-count" style="font-size:12px;color:#aaa;font-weight:400"></span></div>
      <div class="p-grid" id="p-grid"></div>
    </div>
  </div>
  <div class="connecting" id="connecting">🔥 Firebase에 연결 중...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDnPZALC_zKdS9O62NffOrwh29wZwyq-YM",
  authDomain: "aitest-793cc.firebaseapp.com",
  databaseURL: "https://aitest-793cc-default-rtdb.firebaseio.com",
  projectId: "aitest-793cc",
  storageBucket: "aitest-793cc.firebasestorage.app",
  messagingSenderId: "772512191617",
  appId: "1:772512191617:web:412bd8c5d00cd0975f2980"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const COLORS = { 1:'#6c757d', 2:'#20a08a', 3:'#f59e0b', 4:'#7c3aed' };
const BG    = { 1:'#f1efe8', 2:'#e1f5ee', 3:'#faeeda', 4:'#eeedfe' };
const BORD  = { 1:'#6c757d30', 2:'#20a08a30', 3:'#f59e0b30', 4:'#7c3aed30' };

function render(results) {
  document.getElementById('connecting').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  const total = results.length;
  const counts = [1,2,3,4].map(l => ({ l, n: results.filter(r=>r.level===l).length }));
  const avg = total > 0 ? (results.reduce((s,r)=>s+r.count,0)/total).toFixed(1) : '-';

  document.getElementById('m-total').textContent = total + '명';
  document.getElementById('m-avg').textContent = avg !== '-' ? avg + '개' : '-';
  document.getElementById('m-top').textContent = total > 0 ? Math.round(counts[3].n/total*100)+'%' : '-';
  document.getElementById('update-time').textContent = new Date().toLocaleTimeString() + ' 기준 실시간';

  // 바 차트
  document.getElementById('bars').innerHTML = counts.map(({l,n}) => {
    const pct = total > 0 ? Math.round(n/total*100) : 0;
    return `<div class="bar-row">
      <div class="bar-meta">
        <span class="bar-label" style="color:${COLORS[l]}">Level ${l}</span>
        <span class="bar-count">${n}명 (${pct}%)</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${COLORS[l]}"></div></div>
    </div>`;
  }).join('');

  // 도넛 차트
  const R=60, cx=80, cy=80, sw=18, circ=2*Math.PI*R;
  let offset=0;
  const svgEl = document.getElementById('donut-svg');
  if (total===0) {
    svgEl.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#e8e6e0" stroke-width="${sw}"/>
      <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a" font-family="Noto Sans KR">0</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="11" fill="#aaa" font-family="Noto Sans KR">총 참여자</text>`;
  } else {
    const segs = counts.map(({l,n}) => {
      const pct = n/total, dash = pct*circ, s = { l, dash, offset };
      offset += pct; return s;
    });
    svgEl.innerHTML = segs.map(s =>
      `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${COLORS[s.l]}" stroke-width="${sw}"
        stroke-dasharray="${s.dash} ${circ-s.dash}" stroke-dashoffset="${-(s.offset*circ)}"
        style="transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray .6s"/>`
    ).join('') +
      `<text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a" font-family="Noto Sans KR">${total}</text>
       <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="11" fill="#aaa" font-family="Noto Sans KR">총 참여자</text>`;
  }

  // 범례
  document.getElementById('legend').innerHTML = counts.map(({l,n}) => {
    const pct = total>0 ? Math.round(n/total*100) : 0;
    return `<div class="legend-item"><span class="legend-dot" style="background:${COLORS[l]}"></span>Level ${l} ${pct}%</div>`;
  }).join('');

  // 참여자 목록
  document.getElementById('p-count').textContent = `(${total}명)`;
  const grid = document.getElementById('p-grid');
  if (total===0) {
    grid.innerHTML = '<div class="empty">아직 참여자가 없습니다.<br>레벨 테스트에서 결과를 제출해보세요!</div>';
  } else {
    grid.innerHTML = results.map(r => `
      <div class="p-chip" style="background:${BG[r.level]};border-color:${BORD[r.level]}">
        <div><div class="chip-name">${r.name}</div><div class="chip-count">${r.count}개 선택</div></div>
        <span class="chip-badge" style="color:${COLORS[r.level]};border:1px solid ${BORD[r.level]}">L${r.level}</span>
      </div>`).join('');
  }
}

// 실시간 리스너 — Firebase가 데이터 변경을 감지하면 자동으로 render() 호출
onValue(ref(db, 'results'), (snapshot) => {
  const data = snapshot.val();
  const results = data ? Object.values(data).sort((a,b)=>b.ts-a.ts) : [];
  render(results);
});

// 수동 새로고침 버튼용
window.loadData = () => {
  document.getElementById('update-time').textContent = '새로고침 중...';
};
</script>
</body>
</html>
