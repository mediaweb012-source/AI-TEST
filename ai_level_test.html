<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 레벨 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 32px 16px; }
  .container { max-width: 640px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 14px; color: #888; }
  .card { background: #fff; border: 1px solid #e8e6e0; border-radius: 14px; padding: 24px; margin-bottom: 16px; }
  .question-item { display: flex; align-items: flex-start; gap: 14px; padding: 12px 8px; border-bottom: 1px solid #f0ede8; cursor: pointer; border-radius: 8px; transition: background 0.15s; }
  .question-item:last-child { border-bottom: none; }
  .question-item:hover { background: #faf9f7; }
  .checkbox { width: 22px; height: 22px; min-width: 22px; border-radius: 5px; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; }
  .checkbox.checked { background: #7c3aed; border-color: #7c3aed; }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }
  .q-text { font-size: 14px; color: #555; line-height: 1.65; transition: color 0.2s; }
  .question-item.checked .q-text { color: #1a1a1a; }
  .count-bar { background: #fff; border: 1px solid #e8e6e0; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .count-label { font-size: 13px; color: #999; }
  .count-value { font-size: 26px; font-weight: 700; color: #7c3aed; transition: color 0.3s; }
  .submit-btn { width: 100%; padding: 14px; background: #7c3aed; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .submit-btn:hover { background: #6d28d9; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
  .result-card { background: #fff; border-radius: 16px; padding: 36px 28px; text-align: center; border: 2px solid #7c3aed; }
  .result-emoji { font-size: 52px; margin-bottom: 10px; }
  .result-level { font-size: 34px; font-weight: 700; margin-bottom: 4px; }
  .result-range { font-size: 13px; color: #999; margin-bottom: 20px; }
  .result-desc { font-size: 14px; color: #555; line-height: 1.75; text-align: left; background: #faf9f7; border-radius: 10px; padding: 16px; }
  .msg { font-size: 13px; padding: 12px 16px; border-radius: 8px; margin-top: 12px; text-align: center; display: none; }
  .msg.show { display: block; }
  .msg.success { background: #e1f5ee; color: #0f6e56; }
  .msg.error { background: #fcebeb; color: #a32d2d; }
  #result-section { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>AI 레벨 테스트</h1>
    <p>과연 나(우리)는 이 중에서 어디에 속해 있나요?</p>
  </div>

  <div id="test-section">
    <div class="card" id="checklist"></div>
    <div class="count-bar">
      <span class="count-label">현재 선택 항목</span>
      <span class="count-value" id="count-display">0개</span>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitResult()">결과 제출하기</button>
  </div>

  <div id="result-section">
    <div class="result-card" id="result-card">
      <div class="result-emoji" id="result-emoji">🌱</div>
      <div class="result-level" id="result-level"></div>
      <div class="result-range" id="result-range"></div>
      <div class="result-desc" id="result-desc"></div>
    </div>
    <div class="msg" id="status-msg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDnPZALC_zKdS9O62NffOrwh29wZwyq-YM",
  authDomain: "aitest-793cc.firebaseapp.com",
  databaseURL: "https://aitest-793cc-default-rtdb.firebaseio.com",
  projectId: "aitest-793cc",
  storageBucket: "aitest-793cc.firebasestorage.app",
  messagingSenderId: "772512191617",
  appId: "1:772512191617:web:412bd8c5d00cd0975f2980"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._firebaseReady = { db, push, ref };
</script>

<script>
const questions = [
  "AI 답변을 그대로 쓰지 않고, 반드시 사실 확인을 하고 오류를 수정한다.",
  "AI에게 결과물의 형식, 톤, 분량 등의 조건을 명확히 지정한다.",
  "원하는 결과가 나올 때까지 질문을 3회 이상 수정하며 답변을 고도화해 본 적이 있다.",
  "자주 사용하는 나만의 최적화 프롬프트를 저장해 두고 복사해 쓴다.",
  "새로운 AI 서비스나 기능이 나오면 호기심이 생겨 사용해 본다.",
  "유료 AI 서비스 결제를 고민하거나 실제로 사용 중이다.",
  "AI 기술을 더 잘 사용하기 위해 자발적으로 AI 스터디에 참가하거나 관련 강연, 강의를 들은 적이 있다.",
  "월 1회 이상 사용하는 AI 도구가 3개 이상 있다.",
  "내 업무 분야가 아닌 영역의 문제를 AI를 활용해 해결하거나 힌트를 얻은 적이 있다.",
  "AI 덕분에 업무 효율이 1.5배 이상 높아졌다고 체감한다.",
  "나만의 프롬프트 노하우나 AI 활용 사례를 동료나 커뮤니티에 공유한 적이 있다.",
  "AI를 통해 향상된 생산성으로 업무 결과물의 품질을 향상시키는 데 더 많은 시간을 쏟을 수 있게 됐다.",
  "이메일 답장이나 회의록 요약 등 단순 반복 업무의 50% 이상은 AI에게 맡긴다.",
  "AI와 대화하는 과정에서 혼자서는 생각지 못한 새로운 아이디어나 관점을 얻곤 한다.",
  "AI가 할 수 있는 일과 사람이 해야 할 일을 명확히 구분한다.",
  "AI 매니저, AI 챔피언 등 AI와 관련된 새로운 직무나 역할에 대해 들어보거나 관심을 가진 적이 있다.",
  "사내 문서나 고객 정보는 비식별화하거나 요약해 AI에 입력한다."
];

const levelInfo = {
  1: { color:"#6c757d", emoji:"🌱", title:"Level 1", range:"0~3개", desc:"AI를 가끔 검색 엔진 대신 사용하거나, 신기한 기술 정도로 여기는 단계입니다. 아직은 AI 답변의 정확성을 전적으로 신뢰하거나, 어떻게 구체적으로 명령해야 할지 막막함을 느낄 수 있습니다. 이메일 초안 작성 같은 간단한 업무부터 AI에게 시켜보세요." },
  2: { color:"#20a08a", emoji:"🚀", title:"Level 2", range:"4~9개", desc:"AI에게 조건을 부여할 줄 알며, 업무 효율이 올라가는 것을 경험하고 있습니다. 새로운 서비스가 나오면 관심을 갖고 살펴보며, 단순 반복 업무에 AI를 활용하려는 시도를 합니다. 나만의 프롬프트(명령어) 모음집을 만들어 보세요." },
  3: { color:"#f59e0b", emoji:"⚡", title:"Level 3", range:"10~15개", desc:"여러 AI 도구를 능숙하게 다루며, 업무 효율을 높이는 당신은 단순히 원하는 답을 얻는 것을 넘어 AI와 대화하며 아이디어를 확장합니다. 유료 모델 사용을 고려해 보거나 AI 커뮤니티 혹은 스터디 등을 통해 최신 워크플로우를 학습해 보세요." },
  4: { color:"#7c3aed", emoji:"🏆", title:"Level 4", range:"16~17개", desc:"AI가 일상의 기본값이 된 상태로 나만의 최적화된 프롬프트 체계를 갖추고 있습니다. AI 매니저와 같은 새로운 직무 역할에 관심을 가질 만큼 기술적 이해도와 비즈니스 감각을 동시에 갖췄습니다. 습득한 노하우를 커뮤니티나 조직 내부에 전파해 보세요." }
};

const checked = new Array(17).fill(false);

function getLevel(n) {
  if (n <= 3) return 1;
  if (n <= 9) return 2;
  if (n <= 15) return 3;
  return 4;
}

function buildChecklist() {
  document.getElementById('checklist').innerHTML = questions.map((q, i) => `
    <div class="question-item" id="qi-${i}" onclick="toggle(${i})">
      <div class="checkbox" id="cb-${i}">
        <svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="q-text">${q}</span>
    </div>`).join('');
}

function toggle(i) {
  checked[i] = !checked[i];
  document.getElementById('cb-' + i).classList.toggle('checked', checked[i]);
  document.getElementById('qi-' + i).classList.toggle('checked', checked[i]);
  const count = checked.filter(Boolean).length;
  const info = levelInfo[getLevel(count)];
  document.getElementById('count-display').textContent = count + '개';
  document.getElementById('count-display').style.color = info.color;
}

function submitResult() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '제출 중...';

  const count = checked.filter(Boolean).length;
  const level = getLevel(count);
  const info = levelInfo[level];

  document.getElementById('test-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';
  document.getElementById('result-card').style.borderColor = info.color;
  document.getElementById('result-emoji').textContent = info.emoji;
  document.getElementById('result-level').textContent = info.title;
  document.getElementById('result-level').style.color = info.color;
  document.getElementById('result-range').textContent = count + '개 선택 (' + info.range + ')';
  document.getElementById('result-desc').textContent = info.desc;

  const msgEl = document.getElementById('status-msg');
  let waited = 0;
  const timer = setInterval(() => {
    waited += 200;
    if (window._firebaseReady) {
      clearInterval(timer);
      const { db, push, ref } = window._firebaseReady;
      push(ref(db, 'results'), { count, level, ts: Date.now() })
        .then(() => {
          msgEl.textContent = '✓ 제출 완료! 결과가 반영되었습니다.';
          msgEl.className = 'msg success show';
        })
        .catch(e => {
          msgEl.textContent = '⚠ 저장 실패: ' + e.message;
          msgEl.className = 'msg error show';
        });
    } else if (waited > 6000) {
      clearInterval(timer);
      msgEl.textContent = '⚠ Firebase 연결 시간 초과. 페이지를 새로고침 해주세요.';
      msgEl.className = 'msg error show';
    }
  }, 200);
}

buildChecklist();
</script>
</body>
</html>
